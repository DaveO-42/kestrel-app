<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0A1628; }
  #chart { width: 100%; height: 100vh; }
</style>
</head>
<body>
<div id="chart"></div>
<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4/dist/lightweight-charts.standalone.production.js"></script>
<script>
  window.initChart = function(data) {
    try {
      var chart = LightweightCharts.createChart(document.getElementById('chart'), {
        width:  document.getElementById('chart').clientWidth,
        height: window.innerHeight,
        layout: {
          background: { type: 'solid', color: '#0A1628' },
          textColor: '#8899AA',
        },
        grid: {
          vertLines: { color: '#141F2E' },
          horzLines: { color: '#141F2E' },
        },
        watermark: { visible: false },
        crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
        timeScale: { borderColor: '#141F2E' },
        leftPriceScale: {
          visible: true,
          borderVisible: false,
        },
        rightPriceScale: {
          visible: false,
        },
      });

      // ── Candlestick series ──────────────────────────────────
      var candleSeries = chart.addCandlestickSeries({
        upColor:          '#26A69A',
        downColor:        '#EF5350',
        borderUpColor:    '#26A69A',
        borderDownColor:  '#EF5350',
        wickUpColor:      '#26A69A',
        wickDownColor:    '#EF5350',
        lastValueVisible: false,
        priceScaleId:     'left',
      });

      var candles = (data.candles || []).map(function(c) {
        return { time: c.date, open: c.open, high: c.high, low: c.low, close: c.close };
      });
      candleSeries.setData(candles);

      // ── Price Lines (attached to candleSeries → left scale) ─
      var overlays = data.overlays || {};

      if (overlays.initial_stop_usd != null) {
        candleSeries.createPriceLine({
          price:            overlays.initial_stop_usd,
          color:            '#EF5350',
          lineWidth:        1,
          lineStyle:        LightweightCharts.LineStyle.Dashed,
          axisLabelVisible: true,
          title:            'Stop',
        });
      }

      if (overlays.entry_price_usd != null) {
        candleSeries.createPriceLine({
          price:            overlays.entry_price_usd,
          color:            '#C9A84C',
          lineWidth:        1,
          lineStyle:        LightweightCharts.LineStyle.Dashed,
          axisLabelVisible: true,
          title:            'Entry',
        });
      }

      if (overlays.current_stop_usd != null) {
        candleSeries.createPriceLine({
          price:            overlays.current_stop_usd,
          color:            '#EF5350',
          lineWidth:        1,
          lineStyle:        LightweightCharts.LineStyle.Dashed,
          axisLabelVisible: true,
          title:            'Stop',
        });
      }

      // ── EMA Line Series ─────────────────────────────────────
      if (overlays.ema20_series && overlays.ema20_series.length > 0) {
        var ema20Series = chart.addLineSeries({
          color:            '#78B0E8',
          lineWidth:        1,
          title:            'EMA20',
          priceScaleId:     'left',
          priceLineVisible: false,
          lastValueVisible: false,
        });
        ema20Series.setData(overlays.ema20_series.map(function(p) {
          return { time: p.date, value: p.value };
        }));
      }

      if (overlays.ema50_series && overlays.ema50_series.length > 0) {
        var ema50Series = chart.addLineSeries({
          color:            '#7B61FF',
          lineWidth:        1,
          title:            'EMA50',
          priceScaleId:     'left',
          priceLineVisible: false,
          lastValueVisible: false,
        });
        ema50Series.setData(overlays.ema50_series.map(function(p) {
          return { time: p.date, value: p.value };
        }));
      }

      chart.timeScale().fitContent();

      window.addEventListener('resize', function() {
        chart.applyOptions({
          width:  document.getElementById('chart').clientWidth,
          height: window.innerHeight,
        });
      });

    } catch(e) {
      console.error('initChart error:', e);
    }
  };
</script>
</body>
</html>
