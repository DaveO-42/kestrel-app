name: kestrel_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.2.6+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  shared_preferences: ^2.3.0
  package_info_plus: ^8.0.0
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.0
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0
  webview_flutter: ^4.7.0
  flutter_secure_storage: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/icon_square.png"
  adaptive_icon_background: "#0f1822"
  adaptive_icon_foreground: "assets/images/icon_square.png"

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/chart.html
    - assets/images/
    - assets/mock/